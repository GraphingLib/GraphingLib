# The rc_params below are exactly the ones set by matplotlib's plt.xkcd() (with its
# default scale/length/randomness); everything omitted falls back to matplotlib's
# defaults, which is how plt.xkcd() behaves. Three deliberate deviations:
# - path.effects (white outline behind lines) cannot be expressed in a style file.
# - The comic fonts are resolved through the "fantasy" generic family instead of
#   font.family directly, which keeps font lookup silent when they are not installed.
# - axes.prop_cycle must be stated explicitly because get_colors() reads it from the style file.
rc_params:
  font.family: "fantasy"
  font.fantasy: ["xkcd", "xkcd Script", "Humor Sans", "Comic Neue", "Comic Sans MS", "Chicago", "Charcoal", "Impact", "Western", "fantasy"]
  font.size: 14.0
  path.sketch: [1, 100, 2]
  axes.linewidth: 1.5
  lines.linewidth: 2.0
  figure.facecolor: "white"
  grid.linewidth: 0.0
  axes.grid: False
  axes.unicode_minus: False
  axes.edgecolor: "black"
  axes.prop_cycle: cycler('color', ['#1f77b4', '#ff7f0e', '#2ca02c', '#d62728', '#9467bd', '#8c564b', '#e377c2', '#7f7f7f', '#bcbd22', '#17becf'])
  xtick.major.size: 8
  xtick.major.width: 3
  ytick.major.size: 8
  ytick.major.width: 3
